<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ source.name }} · CVVision Live — Humo/Fuego</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F4F5F7;
      color: #182A55;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .lv-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 52px;
      background: #FFFFFF;
      border-bottom: 1px solid #D8DCE3;
      flex-shrink: 0;
      z-index: 10;
    }
    .lv-back {
      display: inline-flex; align-items: center; gap: 7px;
      color: #9D9FA2; text-decoration: none;
      font-size: 0.8rem; font-weight: 500; transition: color .18s;
    }
    .lv-back:hover { color: #182A55; }
    .lv-back svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .lv-sep { width: 1px; height: 22px; background: #D8DCE3; }
    .lv-source-name { font-size: 0.9rem; font-weight: 600; }
    .lv-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 3px 9px; border-radius: 20px; }
    .lv-badge.stream { background: rgba(255,222,0,0.15); color: #182A55; }
    .lv-badge.video  { background: rgba(24,42,85,0.08); color: #182A55; }
    .lv-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #9D9FA2; margin-left: auto; }
    .lv-dot { width: 7px; height: 7px; border-radius: 50%; background: #9D9FA2; }
    .lv-dot.on { background: #22C55E; box-shadow: 0 0 6px rgba(34,197,94,0.5); animation: pulse-dot 2s infinite; }
    .lv-dot.alert { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,0.6); animation: pulse-alert 1s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes pulse-alert { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.2)} }
    .lv-btn-stop {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(239,68,68,0.10); border: 1px solid #D8DCE3;
      color: #EF4444; font-size: 0.75rem; font-weight: 600; font-family: inherit;
      padding: 6px 14px; border-radius: 7px; cursor: pointer; transition: background .18s;
    }
    .lv-btn-stop:hover { background: rgba(239,68,68,0.18); }
    .lv-btn-stop svg { width: 12px; height: 12px; stroke: currentColor; fill: currentColor; stroke-width: 0; }
    .lv-btn-reset {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(24,42,85,0.06); border: 1px solid #D8DCE3; color: #9D9FA2;
      font-size: 0.75rem; font-family: inherit; padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: color .18s;
    }
    .lv-btn-reset:hover { color: #182A55; }
    .lv-btn-reset svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; }

    .lv-body { display: flex; flex: 1; min-height: 0; }

    .lv-feed {
      flex: 1; min-width: 0; background: #000;
      display: flex; align-items: center; justify-content: center;
      position: relative; border-right: 1px solid #D8DCE3;
    }
    .lv-feed-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .lv-feed-placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; color: #9D9FA2; text-align: center; padding: 32px;
    }
    .lv-feed-placeholder svg { width: 64px; height: 64px; stroke: #D8DCE3; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .lv-feed-placeholder p    { font-size: 0.88rem; color: #9D9FA2; }
    .lv-feed-placeholder span { font-size: 0.72rem; color: #9D9FA2; word-break: break-all; }
    .lv-feed-ts { position: absolute; bottom: 10px; right: 14px; font-size: 0.68rem; font-family: "SF Mono","Fira Code",monospace; color: rgba(255,255,255,0.4); pointer-events: none; }

    .lv-panel {
      width: 320px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 0;
      overflow-y: auto; background: #FFFFFF;
    }
    .lv-section { border-bottom: 1px solid #D8DCE3; padding: 16px; }
    .lv-section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #9D9FA2; margin-bottom: 14px;
    }
    .lv-section-title svg { width: 13px; height: 13px; stroke: #182A55; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .lv-alert-banner {
      background: rgba(239,68,68,0.10);
      border: 2px solid #EF4444;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      animation: pulse-border 2s infinite;
    }
    @keyframes pulse-border { 0%,100%{border-color:#EF4444} 50%{border-color:#FCA5A5} }
    .lv-alert-banner.active { display: block; }
    .lv-alert-title {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 1.1rem; font-weight: 800; color: #EF4444;
    }
    .lv-alert-title svg { width: 20px; height: 20px; fill: #EF4444; stroke: none; }
    .lv-alert-time { font-size: 0.82rem; color: #182A55; margin-top: 8px; }

    .lv-count-big { text-align: center; padding: 8px 0 12px; }
    .lv-count-num { font-size: 3.5rem; font-weight: 800; line-height: 1; color: #182A55; font-variant-numeric: tabular-nums; }
    .lv-count-lbl { font-size: 0.72rem; color: #9D9FA2; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .lv-count-num.alert { color: #EF4444; }

    .lv-info-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.72rem; color: #9D9FA2; padding: 10px 16px;
      border-top: 1px solid #D8DCE3;
    }
    .lv-info-id { color: #182A55; font-weight: 600; }
  </style>
</head>
<body>

<!-- ── Topbar ────────────────────────────────────────────────── -->
<header class="lv-topbar">
  <a class="lv-back" href="/module/smoke">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </a>
  <div class="lv-sep"></div>
  <span class="lv-source-name">{{ source.name }}</span>
  <span class="lv-badge {{ source.type }}">{{ source.type }}</span>

  <div class="lv-status">
    <span class="lv-dot on" id="lv-dot"></span>
    <span id="lv-status-txt">Iniciando…</span>
  </div>

  <button class="lv-btn-reset" id="btn-reset">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Reiniciar
  </button>

  <button class="lv-btn-stop" id="btn-stop">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg>
    Detener
  </button>
</header>

<!-- ── Cuerpo ─────────────────────────────────────────────────── -->
<div class="lv-body">

  <!-- Video feed -->
  <div class="lv-feed">
    <div class="lv-feed-placeholder" id="feed-placeholder">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <p id="feed-placeholder-msg">Conectando con la fuente…</p>
      <span>{{ source.path }}</span>
    </div>
    <img class="lv-feed-img" id="lv-feed-img" src="" alt="Live feed" style="display:none">
    <span class="lv-feed-ts" id="lv-ts"></span>
  </div>

  <!-- Panel -->
  <div class="lv-panel">

    <!-- ── 1. Estado de alerta ───────────────────────────── -->
    <div class="lv-section">
      <div class="lv-section-title">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Estado
      </div>

      <div id="alert-banner" class="lv-alert-banner" style="display:none">
        <div class="lv-alert-title">
          <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3l8 14H4l8-14zm-1 8v-4h2v4h-2zm0 4v-2h2v2h-2z"/></svg>
          HUMO / FUEGO DETECTADO
        </div>
        <div class="lv-alert-time" id="alert-time">—</div>
      </div>

      <div class="lv-count-big">
        <div class="lv-count-num" id="cnt-detections">0</div>
        <div class="lv-count-lbl">detecciones de humo/fuego</div>
      </div>
    </div>

    <!-- ── 2. Info footer ────────────────────────────────── -->
    <div class="lv-info-row">
      <span>Fuente #<span class="lv-info-id">{{ source.id }}</span></span>
      <span id="lv-fps">— fps</span>
    </div>

  </div><!-- /lv-panel -->
</div><!-- /lv-body -->

<script>
const SOURCE_ID = {{ source.id }};
let poll = null;
let frameCount = 0;
let fpsTimer   = null;

// ── Iniciar pipeline ──────────────────────────────────────────────────────
(async () => {
  document.getElementById("feed-placeholder-msg").textContent = "Iniciando pipeline…";
  const r = await fetch(`/api/smoke/sources/${SOURCE_ID}/start`, { method: "POST" });
  if (r.ok) {
    document.getElementById("feed-placeholder-msg").textContent = "Cargando modelo de IA…";
    startStream();
    poll = setInterval(fetchStats, 2000);
    startFpsMeter();
  } else {
    document.getElementById("feed-placeholder-msg").textContent = "Error al iniciar el pipeline";
    document.getElementById("lv-dot").classList.remove("on");
    document.getElementById("lv-status-txt").textContent = "Error";
  }
})();

function startStream() {
  const img = document.getElementById("lv-feed-img");
  img.onload = () => {
    document.getElementById("feed-placeholder").style.display = "none";
    img.style.display = "block";
    document.getElementById("lv-status-txt").textContent = "En línea";
    frameCount++;
  };
  img.onerror = () => {
    document.getElementById("feed-placeholder").style.display = "flex";
    document.getElementById("feed-placeholder-msg").textContent = "Error de conexión con la fuente";
    img.style.display = "none";
    document.getElementById("lv-dot").classList.remove("on");
    document.getElementById("lv-status-txt").textContent = "Sin señal";
  };
  img.src = `/api/smoke/stream/${SOURCE_ID}`;
}

function startFpsMeter() {
  frameCount = 0;
  fpsTimer = setInterval(() => {
    document.getElementById("lv-fps").textContent = `${frameCount} fps`;
    frameCount = 0;
  }, 1000);
}

// ── Stats polling ─────────────────────────────────────────────────────────
async function fetchStats() {
  try {
    const r = await fetch(`/api/smoke/sources/${SOURCE_ID}/stats`);
    if (!r.ok) return;
    const d = await r.json();
    updateStats(d);
  } catch (_) {}
}

function updateStats(d) {
  const alertBanner = document.getElementById("alert-banner");
  const dot = document.getElementById("lv-dot");
  const statusTxt = document.getElementById("lv-status-txt");

  if (d.alert_triggered) {
    alertBanner.style.display = "block";
    document.getElementById("alert-time").textContent = `Primera vez detectado: ${d.first_detection || '--'}`;
    dot.className = "lv-dot alert";
    statusTxt.textContent = "ALERTA";
    document.querySelector(".lv-count-num").classList.add("alert");
  } else {
    alertBanner.style.display = "none";
    dot.className = "lv-dot on";
    statusTxt.textContent = "Monitoreando";
    document.querySelector(".lv-count-num").classList.remove("alert");
  }

  document.getElementById("cnt-detections").textContent = d.smoke_detected ? "1" : "0";

  const now = new Date();
  document.getElementById("lv-ts").textContent =
    now.toLocaleTimeString("es-MX", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
}

// ── Reiniciar ─────────────────────────────────────────────────────────────
document.getElementById("btn-reset").addEventListener("click", async () => {
  await fetch(`/api/smoke/sources/${SOURCE_ID}/reset`, { method: "POST" });
  document.getElementById("alert-banner").style.display = "none";
  document.getElementById("cnt-detections").textContent = "0";
  document.querySelector(".lv-count-num").classList.remove("alert");
  document.getElementById("lv-dot").className = "lv-dot on";
  document.getElementById("lv-status-txt").textContent = "Monitoreando";
});

// ── Detener ───────────────────────────────────────────────────────────────
document.getElementById("btn-stop").addEventListener("click", async () => {
  clearInterval(poll);
  clearInterval(fpsTimer);
  await fetch(`/api/smoke/sources/${SOURCE_ID}/stop`, { method: "POST" });
  document.getElementById("lv-feed-img").src = "";
  document.getElementById("lv-feed-img").style.display = "none";
  document.getElementById("feed-placeholder").style.display = "flex";
  document.getElementById("feed-placeholder-msg").textContent = "Análisis detenido";
  document.getElementById("lv-dot").classList.remove("on", "alert");
  document.getElementById("lv-status-txt").textContent = "Detenido";
  document.getElementById("lv-fps").textContent = "— fps";
});

// ── Cleanup al salir ──────────────────────────────────────────────────────
window.addEventListener("pagehide", () => {
  navigator.sendBeacon(`/api/smoke/sources/${SOURCE_ID}/stop`);
});
</script>
</body>
</html>
